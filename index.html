<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anti Control Tower — 실전 관제</title>
<meta name="description" content="CHOBH1024 운영 사이트 실시간 헬스체크 · AdSense 상태 관제탑">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-dark: #05050a;
    --glass-bg: rgba(255, 255, 255, 0.03);
    --glass-border: rgba(255, 255, 255, 0.08);
    --text-main: #f8fafc;
    --text-muted: #94a3b8;
    --accent-blue: #3b82f6;
    --accent-purple: #8b5cf6;
    --accent-teal: #14b8a6;
    --accent-rose: #f43f5e;
    --accent-amber: #f59e0b;
    --accent-emerald: #10b981;
    --radius-sm: 8px;
    --radius-md: 16px;
    --ease: cubic-bezier(0.16, 1, 0.3, 1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Pretendard', -apple-system, sans-serif;
    background-color: var(--bg-dark);
    color: var(--text-main);
    overflow-x: hidden;
    line-height: 1.5;
    min-height: 100vh;
  }

  .bg-orb {
    position: fixed; border-radius: 50%; filter: blur(120px);
    z-index: -1; opacity: 0.4;
    animation: float 20s infinite ease-in-out alternate;
  }
  .orb-1 { width: 500px; height: 500px; background: rgba(59,130,246,.3); top: -200px; left: -100px; }
  .orb-2 { width: 400px; height: 400px; background: rgba(139,92,246,.2); bottom: -100px; right: -50px; animation-delay: -5s; }
  .orb-3 { width: 600px; height: 600px; background: rgba(20,184,166,.15); top: 30%; left: 40%; animation-delay: -10s; }
  @keyframes float {
    0% { transform: translate(0,0) scale(1); }
    100% { transform: translate(50px,30px) scale(1.1); }
  }

  .container { max-width: 1400px; margin: 0 auto; padding: 32px 20px 60px; }

  .header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 28px; flex-wrap: wrap; gap: 16px;
  }
  .title-group { display: flex; align-items: center; gap: 16px; }
  .title-icon {
    width: 48px; height: 48px;
    background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
    border-radius: 12px; display: flex; align-items: center; justify-content: center;
    font-size: 22px; color: white;
    box-shadow: 0 8px 32px rgba(59,130,246,.3);
  }
  .title h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.02em; }
  .title p { color: var(--text-muted); font-size: 13px; margin-top: 2px; }

  .header-actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .status-chip {
    font-family: Inter, sans-serif; font-size: 12px; color: var(--text-muted);
    background: var(--glass-bg); padding: 6px 12px; border-radius: 20px;
    border: 1px solid var(--glass-border); display: inline-flex; align-items: center; gap: 6px;
  }
  .status-chip .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent-emerald); }
  .status-chip .dot.warn { background: var(--accent-amber); }
  .status-chip .dot.err { background: var(--accent-rose); }
  .status-chip .dot.loading {
    background: var(--accent-blue);
    animation: pulse 1s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .35; } }

  .btn {
    height: 36px; padding: 0 14px; border-radius: 8px;
    border: 1px solid var(--glass-border); background: var(--glass-bg);
    color: var(--text-main); font-family: inherit; font-size: 13px; font-weight: 500;
    cursor: pointer; display: inline-flex; align-items: center; gap: 8px;
    transition: background .2s, border-color .2s;
  }
  .btn:hover { background: rgba(255,255,255,.08); border-color: rgba(255,255,255,.2); }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  .btn.primary {
    background: linear-gradient(135deg, rgba(59,130,246,.25), rgba(139,92,246,.25));
    border-color: rgba(59,130,246,.4);
  }
  .btn.primary:hover { background: linear-gradient(135deg, rgba(59,130,246,.4), rgba(139,92,246,.4)); }

  .summary-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 14px; margin-bottom: 28px;
  }
  .summary-card {
    background: var(--glass-bg); border: 1px solid var(--glass-border);
    border-radius: var(--radius-md); padding: 18px 20px;
    backdrop-filter: blur(12px); display: flex; flex-direction: column; gap: 6px;
  }
  .summary-title {
    font-size: 12px; color: var(--text-muted); text-transform: uppercase;
    letter-spacing: .04em; font-weight: 600; display: flex; align-items: center; gap: 8px;
  }
  .summary-value {
    font-size: 32px; font-family: Inter, sans-serif; font-weight: 700; letter-spacing: -.03em;
  }
  .summary-value .unit {
    font-size: 13px; color: var(--text-muted); font-weight: 400; margin-left: 4px;
  }

  .controls-bar {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 20px; flex-wrap: wrap; gap: 12px;
  }
  .search-box {
    display: flex; align-items: center; background: var(--glass-bg);
    border: 1px solid var(--glass-border); border-radius: var(--radius-sm);
    padding: 0 14px; height: 42px; width: min(320px, 100%);
    transition: border-color .3s;
  }
  .search-box:focus-within { border-color: var(--accent-blue); }
  .search-box i { color: var(--text-muted); margin-right: 10px; }
  .search-box input {
    background: transparent; border: none; outline: none;
    color: var(--text-main); font-family: inherit; font-size: 14px; width: 100%;
  }

  .filter-tabs {
    display: flex; gap: 4px; flex-wrap: wrap;
    background: var(--glass-bg); padding: 4px; border-radius: var(--radius-sm);
    border: 1px solid var(--glass-border);
  }
  .filter-btn {
    background: transparent; border: none; color: var(--text-muted);
    padding: 8px 12px; border-radius: 6px; font-family: inherit;
    font-size: 13px; font-weight: 500; cursor: pointer; transition: all .2s;
  }
  .filter-btn:hover { color: var(--text-main); background: rgba(255,255,255,.05); }
  .filter-btn.active { background: rgba(255,255,255,.1); color: var(--text-main); }

  .error-banner {
    display: none; margin-bottom: 20px; padding: 14px 18px;
    background: rgba(244,63,94,.1); border: 1px solid rgba(244,63,94,.3);
    border-radius: var(--radius-sm); color: #fda4af; font-size: 14px;
  }
  .error-banner.show { display: flex; align-items: center; gap: 10px; }

  .sites-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 18px;
  }

  .site-card {
    background: var(--glass-bg); border: 1px solid var(--glass-border);
    border-radius: var(--radius-md); padding: 20px;
    backdrop-filter: blur(16px);
    transition: transform .3s var(--ease), border-color .3s, box-shadow .3s;
    display: flex; flex-direction: column; gap: 14px;
    position: relative; overflow: hidden;
  }
  .site-card:hover {
    transform: translateY(-3px);
    border-color: rgba(255,255,255,.18);
    box-shadow: 0 12px 40px rgba(0,0,0,.4);
  }
  .site-card.offline { border-color: rgba(244,63,94,.35); }
  .site-card.degraded { border-color: rgba(245,158,11,.35); }

  .card-header { display: flex; gap: 14px; align-items: flex-start; }
  .card-icon {
    width: 44px; height: 44px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  .card-info { flex-grow: 1; min-width: 0; }
  .card-name { font-size: 17px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-domain {
    font-size: 12px; color: var(--text-muted); font-family: Inter, sans-serif; margin-top: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .card-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

  .ping-badge {
    font-family: Inter, sans-serif; font-size: 11px; font-weight: 600;
    padding: 4px 8px; border-radius: 20px; white-space: nowrap;
    background: rgba(255,255,255,.05); color: var(--text-muted);
  }
  .ping-badge.online { background: rgba(16,185,129,.12); color: var(--accent-emerald); }
  .ping-badge.degraded { background: rgba(245,158,11,.12); color: var(--accent-amber); }
  .ping-badge.offline { background: rgba(244,63,94,.12); color: var(--accent-rose); }
  .ping-badge.loading { background: rgba(59,130,246,.12); color: var(--accent-blue); }

  .card-metrics { display: flex; gap: 8px; flex-wrap: wrap; }
  .metric-chip {
    background: rgba(0,0,0,.25); border: 1px solid rgba(255,255,255,.06);
    padding: 5px 10px; border-radius: 6px;
    font-size: 11px; color: var(--text-muted); font-family: Inter, sans-serif;
    display: flex; align-items: center; gap: 5px;
  }
  .metric-chip.highlight { color: var(--text-main); border-color: rgba(255,255,255,.12); }

  .ads-section {
    background: rgba(0,0,0,.22); border-radius: 8px; padding: 12px;
  }
  .ads-head {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 8px; font-size: 12px; font-weight: 500;
  }
  .status-pill {
    padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600;
  }
  .pill-approved { background: rgba(16,185,129,.12); color: var(--accent-emerald); }
  .pill-pending { background: rgba(245,158,11,.12); color: var(--accent-amber); }
  .pill-none { background: rgba(255,255,255,.05); color: var(--text-muted); }

  .task-list { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .task-item { font-size: 11px; color: var(--text-muted); display: flex; align-items: center; gap: 5px; }
  .task-item.done { color: var(--text-main); }
  .task-item.done i { color: var(--accent-emerald); }
  .task-item.todo i { color: rgba(255,255,255,.2); }

  .progress-wrap {
    height: 3px; background: rgba(255,255,255,.1); border-radius: 2px;
    margin-top: 10px; overflow: hidden;
  }
  .progress-fill { height: 100%; border-radius: 2px; transition: width .8s var(--ease); }

  .card-actions {
    display: flex; gap: 8px;
    border-top: 1px solid var(--glass-border); padding-top: 14px; margin-top: auto;
  }
  .action-btn {
    flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px;
    height: 34px; border-radius: 6px; background: rgba(255,255,255,.05);
    color: var(--text-main); text-decoration: none; font-size: 12px; font-weight: 500;
    transition: background .2s; cursor: pointer; border: none; font-family: inherit;
  }
  .action-btn:hover { background: rgba(255,255,255,.1); }

  .empty-state {
    grid-column: 1 / -1; text-align: center; padding: 60px 20px; color: var(--text-muted);
  }
  .empty-state i { font-size: 36px; margin-bottom: 12px; opacity: .4; }

  .skeleton {
    background: linear-gradient(90deg, rgba(255,255,255,.04) 25%, rgba(255,255,255,.08) 50%, rgba(255,255,255,.04) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.2s infinite;
    border-radius: 8px;
  }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

  .footer {
    margin-top: 40px; text-align: center; font-size: 12px; color: var(--text-muted);
  }
  .footer a { color: var(--accent-blue); text-decoration: none; }

  @media (max-width: 640px) {
    .title h1 { font-size: 20px; }
    .summary-value { font-size: 26px; }
    .sites-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-orb orb-3"></div>

  <div class="container">
    <header class="header">
      <div class="title-group">
        <div class="title-icon"><i class="fa-solid fa-tower-broadcast"></i></div>
        <div class="title">
          <h1>Anti Control Tower</h1>
          <p>실전 관제 · 헬스체크 · AdSense 현황</p>
        </div>
      </div>
      <div class="header-actions">
        <span class="status-chip" id="system-chip">
          <span class="dot loading" id="system-dot"></span>
          <span id="system-label">체크 중…</span>
        </span>
        <span class="status-chip" id="checked-at" style="display:none"></span>
        <button class="btn primary" id="btn-refresh" onclick="refresh()" title="지금 다시 체크">
          <i class="fa-solid fa-rotate" id="refresh-icon"></i> 새로고침
        </button>
        <a class="btn" href="/guide.html" title="연동 가이드"><i class="fa-solid fa-book"></i> 가이드</a>
      </div>
    </header>

    <div class="error-banner" id="error-banner">
      <i class="fa-solid fa-triangle-exclamation"></i>
      <span id="error-text"></span>
    </div>

    <div class="summary-grid" id="summary-grid">
      <div class="summary-card"><div class="summary-title">전체</div><div class="summary-value skeleton" style="height:36px;width:60%"></div></div>
      <div class="summary-card"><div class="summary-title">Online</div><div class="summary-value skeleton" style="height:36px;width:50%"></div></div>
      <div class="summary-card"><div class="summary-title">Offline</div><div class="summary-value skeleton" style="height:36px;width:50%"></div></div>
      <div class="summary-card"><div class="summary-title">AdSense</div><div class="summary-value skeleton" style="height:36px;width:50%"></div></div>
    </div>

    <div class="controls-bar">
      <div class="search-box">
        <i class="fa-solid fa-search"></i>
        <input type="text" id="search-input" placeholder="이름 · 도메인 검색…" oninput="handleSearch()">
      </div>
      <div class="filter-tabs" id="filter-tabs">
        <button class="filter-btn active" data-filter="all" onclick="setFilter('all', this)">전체</button>
        <button class="filter-btn" data-filter="online" onclick="setFilter('online', this)">Online</button>
        <button class="filter-btn" data-filter="offline" onclick="setFilter('offline', this)">문제</button>
        <button class="filter-btn" data-filter="approved" onclick="setFilter('approved', this)">AdSense 승인</button>
        <button class="filter-btn" data-filter="pending" onclick="setFilter('pending', this)">심사중</button>
      </div>
    </div>

    <div class="sites-grid" id="sites-grid">
      <div class="empty-state"><i class="fa-solid fa-spinner fa-spin"></i><div>사이트 헬스 확인 중…</div></div>
    </div>

    <div class="footer">
      자동 새로고침 5분 · API <code>/api/health</code> ·
      <a href="https://github.com/CHOBH1024/control-tower" target="_blank" rel="noopener">GitHub</a>
    </div>
  </div>

<script>
  /** @type {Array} */
  let SITES = [];
  let currentFilter = 'all';
  let currentSearch = '';
  let isLoading = false;
  let lastCheckedAt = null;
  const REFRESH_MS = 5 * 60 * 1000;

  function hexToRgba(hex, alpha) {
    if (!hex || hex.length < 7) return `rgba(59,130,246,${alpha})`;
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return `rgba(${r},${g},${b},${alpha})`;
  }

  function formatKST(iso) {
    if (!iso) return '';
    try {
      return new Date(iso).toLocaleString('ko-KR', { timeZone: 'Asia/Seoul' });
    } catch { return iso; }
  }

  function setSystemState(state, label) {
    const dot = document.getElementById('system-dot');
    const el = document.getElementById('system-label');
    dot.className = 'dot' + (state === 'ok' ? '' : state === 'warn' ? ' warn' : state === 'err' ? ' err' : ' loading');
    el.textContent = label;
  }

  function showError(msg) {
    const banner = document.getElementById('error-banner');
    document.getElementById('error-text').textContent = msg;
    banner.classList.add('show');
  }
  function hideError() {
    document.getElementById('error-banner').classList.remove('show');
  }

  function renderSummary(summary) {
    const s = summary || {
      total: SITES.length,
      online: SITES.filter(x => x.health === 'online').length,
      degraded: SITES.filter(x => x.health === 'degraded').length,
      offline: SITES.filter(x => x.health === 'offline').length,
      adsenseApproved: SITES.filter(x => x.adsense === 'approved').length,
      adsensePending: SITES.filter(x => x.adsense === 'pending').length,
    };
    const problem = (s.offline || 0) + (s.degraded || 0);

    document.getElementById('summary-grid').innerHTML = `
      <div class="summary-card">
        <div class="summary-title"><i class="fa-solid fa-globe" style="color:var(--accent-blue)"></i>전체 관제</div>
        <div class="summary-value">${s.total}<span class="unit">개</span></div>
      </div>
      <div class="summary-card">
        <div class="summary-title"><i class="fa-solid fa-circle-check" style="color:var(--accent-emerald)"></i>Online</div>
        <div class="summary-value" style="color:var(--accent-emerald)">${s.online}<span class="unit">개</span></div>
      </div>
      <div class="summary-card">
        <div class="summary-title"><i class="fa-solid fa-triangle-exclamation" style="color:var(--accent-rose)"></i>문제 (Down/4xx)</div>
        <div class="summary-value" style="color:${problem ? 'var(--accent-rose)' : 'var(--text-main)'}">${problem}<span class="unit">개</span></div>
      </div>
      <div class="summary-card">
        <div class="summary-title"><i class="fa-solid fa-dollar-sign" style="color:var(--accent-amber)"></i>AdSense 승인 / 심사</div>
        <div class="summary-value">${s.adsenseApproved}<span class="unit">/ ${s.adsensePending}</span></div>
      </div>
    `;

    if (problem > 0) {
      setSystemState('err', `문제 ${problem}건 감지`);
    } else if (s.total > 0) {
      setSystemState('ok', 'All Systems Online');
    }
  }

  function filteredList() {
    return SITES.filter(s => {
      if (currentFilter === 'online' && s.health !== 'online') return false;
      if (currentFilter === 'offline' && s.health === 'online') return false;
      if (currentFilter === 'approved' && s.adsense !== 'approved') return false;
      if (currentFilter === 'pending' && s.adsense !== 'pending') return false;
      if (currentSearch) {
        const q = currentSearch.toLowerCase();
        return (
          (s.name || '').toLowerCase().includes(q) ||
          (s.domain || '').toLowerCase().includes(q) ||
          (s.sub || '').toLowerCase().includes(q)
        );
      }
      return true;
    });
  }

  function renderSites() {
    const grid = document.getElementById('sites-grid');
    const list = filteredList();
    grid.innerHTML = '';

    if (!list.length) {
      grid.innerHTML = `<div class="empty-state"><i class="fa-solid fa-filter"></i><div>조건에 맞는 사이트가 없습니다</div></div>`;
      return;
    }

    list.forEach(s => {
      const c = s.color || '#3b82f6';
      const bgRgba = hexToRgba(c, 0.12);
      const borderRgba = hexToRgba(c, 0.3);
      const health = s.health || 'loading';
      const healthLabel =
        health === 'online' ? `${s.ms ?? '—'}ms` :
        health === 'degraded' ? `${s.statusCode || '4xx'}` :
        health === 'offline' ? (s.error === 'timeout' ? 'Timeout' : (s.statusCode || 'Down')) :
        '…';

      let pillHtml = '<span class="status-pill pill-none">미신청</span>';
      let progressPct = 0;
      let pColor = 'var(--text-muted)';
      if (s.adsense === 'approved') {
        pillHtml = '<span class="status-pill pill-approved"><i class="fa-solid fa-check"></i> 승인</span>';
        progressPct = 100;
        pColor = 'var(--accent-emerald)';
      } else if (s.adsense === 'pending') {
        pillHtml = '<span class="status-pill pill-pending"><i class="fa-solid fa-hourglass-half"></i> 심사중</span>';
        const done = 1 + (s.gsc ? 1 : 0) + (s.seoText ? 1 : 0);
        progressPct = Math.round((done / 4) * 100);
        pColor = progressPct >= 75 ? 'var(--accent-teal)' : progressPct >= 50 ? 'var(--accent-amber)' : 'var(--accent-rose)';
      }

      const taskHtml = s.adsense === 'none'
        ? '<div style="font-size:11px;color:var(--text-muted);text-align:center;padding:6px 0;">AdSense 신청 없음</div>'
        : `<div class="task-list">
            <div class="task-item done"><i class="fa-solid fa-circle-check"></i> ads.txt</div>
            <div class="task-item ${s.gsc ? 'done' : 'todo'}"><i class="fa-solid ${s.gsc ? 'fa-circle-check' : 'fa-circle'}"></i> GSC 제출</div>
            <div class="task-item ${s.seoText ? 'done' : 'todo'}"><i class="fa-solid ${s.seoText ? 'fa-circle-check' : 'fa-circle'}"></i> SEO 강화</div>
            <div class="task-item ${s.adsense === 'approved' ? 'done' : 'todo'}"><i class="fa-solid ${s.adsense === 'approved' ? 'fa-circle-check' : 'fa-circle'}"></i> 승인</div>
          </div>
          <div class="progress-wrap"><div class="progress-fill" style="background:${pColor};width:${progressPct}%"></div></div>`;

      const card = document.createElement('div');
      card.className = `site-card ${health === 'offline' ? 'offline' : health === 'degraded' ? 'degraded' : ''}`;
      card.innerHTML = `
        <div class="card-header">
          <div class="card-icon" style="background:${bgRgba};color:${c};border:1px solid ${borderRgba}">
            <i class="fa-solid ${s.icon || 'fa-globe'}"></i>
          </div>
          <div class="card-info">
            <div class="card-name">${escapeHtml(s.name)}</div>
            <div class="card-domain">${escapeHtml(s.domain)}</div>
            <div class="card-sub">${escapeHtml(s.sub || '')}</div>
          </div>
          <div class="ping-badge ${health}">${healthLabel}</div>
        </div>

        <div class="card-metrics">
          <div class="metric-chip highlight"><i class="fa-solid fa-signal"></i> HTTP ${s.statusCode ?? '—'}</div>
          <div class="metric-chip"><i class="fa-solid fa-tag"></i> ${escapeHtml(s.category || '—')}</div>
          <div class="metric-chip"><i class="fa-brands fa-github"></i> ${(s.github || '').split('/')[1] || 'repo'}</div>
        </div>

        <div class="ads-section">
          <div class="ads-head"><span>AdSense</span>${pillHtml}</div>
          ${taskHtml}
        </div>

        <div class="card-actions">
          <a href="https://${s.domain}" target="_blank" rel="noopener" class="action-btn">
            <i class="fa-solid fa-arrow-up-right-from-square"></i> 접속
          </a>
          <a href="https://github.com/${s.github}" target="_blank" rel="noopener" class="action-btn">
            <i class="fa-brands fa-github"></i> 깃허브
          </a>
          <button class="action-btn" onclick="copyDomain('${s.domain}')">
            <i class="fa-regular fa-copy"></i> 복사
          </button>
        </div>
      `;
      grid.appendChild(card);
    });
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  async function loadHealth() {
    if (isLoading) return;
    isLoading = true;
    const btn = document.getElementById('btn-refresh');
    const icon = document.getElementById('refresh-icon');
    btn.disabled = true;
    icon.classList.add('fa-spin');
    setSystemState('loading', '체크 중…');
    hideError();

    try {
      const res = await fetch('/api/health', { cache: 'no-store' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      if (!data.ok) throw new Error(data.error || 'API 응답 오류');

      SITES = data.sites || [];
      lastCheckedAt = data.checkedAt;
      const checkedEl = document.getElementById('checked-at');
      checkedEl.style.display = 'inline-flex';
      checkedEl.textContent = '갱신 ' + formatKST(lastCheckedAt);

      renderSummary(data.summary);
      renderSites();
    } catch (err) {
      console.error(err);
      showError('헬스 API 실패: ' + err.message + ' — /api/health 를 확인하세요.');
      setSystemState('err', 'API 오류');
      if (!SITES.length) {
        document.getElementById('sites-grid').innerHTML =
          `<div class="empty-state"><i class="fa-solid fa-plug-circle-xmark"></i><div>데이터를 불러오지 못했습니다</div></div>`;
      }
    } finally {
      isLoading = false;
      btn.disabled = false;
      icon.classList.remove('fa-spin');
    }
  }

  function refresh() { loadHealth(); }

  function setFilter(f, btn) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderSites();
  }

  function handleSearch() {
    currentSearch = document.getElementById('search-input').value.trim();
    renderSites();
  }

  function copyDomain(domain) {
    navigator.clipboard.writeText(domain).then(() => {
      const toast = document.createElement('div');
      toast.textContent = domain + ' 복사됨';
      toast.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;z-index:99;border:1px solid rgba(255,255,255,.1)';
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 1600);
    });
  }

  document.addEventListener('DOMContentLoaded', () => {
    loadHealth();
    setInterval(loadHealth, REFRESH_MS);
  });
</script>
</body>
</html>
